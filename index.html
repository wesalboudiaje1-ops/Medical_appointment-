<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pediatric Clinic - Book Appointment</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

    <div class="header">
        🏥 Pediatric Clinic
        <p>Online Appointment Booking System</p>
    </div>

    <div class="card">

        <label>👨‍⚕️ Select Doctor</label>
        <select id="doctor">
            <option>Dr. Ahmed - Pediatrician</option>
            <option>Dr. Sara - Pediatrician</option>
        </select>

        <label>👶 Child's Name</label>
        <input type="text" id="name">

        <label>🎂 Age</label>
        <input type="number" id="age">

        <label>📞 Phone Number</label>
        <input type="text" id="phone">

        <label>📅 Appointment Date</label>
        <input type="date" id="date">

        <label>💰 Price</label>
        <input type="text" id="price" value="200 DH">

        <button onclick="generatePDF()">Confirm & Download PDF</button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="app.js"></script>
</body>
</html>
